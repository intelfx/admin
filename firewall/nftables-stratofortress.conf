#!/usr/bin/nft -f

define want_tun_outpost = 0x1

table inet nft;
flush table inet nft;

table inet nft {
  chain common {
    # trusted interfaces
    iifname { lo, tailscale0 } accept

    # early drop of invalid connections
    ct state invalid drop

    # allow established/related connections
    ct state { established, related } accept

    # allow dnat-ed connections
    ct status dnat accept

    # allow icmp
    meta l4proto { icmp, icmpv6 } limit rate 1000/second accept
  }

  chain input {
    type filter hook input priority filter; policy accept;

    jump common
  }

  chain forward {
    type filter hook forward priority filter; policy accept;

    jump common
  }

  set tun_bypass4 {
    typeof ip daddr
    flags interval
    elements = {
      0.0.0.0/8, 10.0.0.0/8,
      127.0.0.0/8, 169.254.0.0/16,
      172.16.0.0/12, 192.0.0.0/24,
      192.0.2.0/24, 192.88.99.0/24,
      192.168.0.0/16, 198.18.0.0/15,
      198.51.100.0/24, 203.0.113.0/24,
      224.0.0.0/4, 240.0.0.0-255.255.255.255,
    }
  }

  set tun_bypass6 {
    typeof ip6 daddr
    flags interval
    elements = {
      ::,
      ::1,
      ::ffff:0:0:0/96,
      64:ff9b::/96,
      100::/64,
      2001::/32,
      2001:20::/28,
      2001:db8::/32,
      2002::/16,
      fc00::/7,
      fe80::/10,
      ff00::-ffff:ffff:ffff:ffff:ffff:ffff:ffff:ffff,
    }
  }

  set transmission_service {
    type cgroupsv2;
  }
  set torrents_slice {
    type cgroupsv2;
  }

  # specific bypass destinations
  set transmission_bypass4 {
    typeof ip daddr
    flags interval
    elements = {
      # btX.t-ru.org
      172.67.185.253,
      104.21.0.111,
      188.114.97.1,
      188.114.96.1,
    }
  }

  set transmission_bypass6 {
    typeof ip6 daddr
    flags interval
  }

  # ports commonly used for trackers
  set transmission_ports {
		type inet_proto . inet_service
    elements = {
      tcp . 80,
      tcp . 443,
      tcp . 1096,
      tcp . 1337,
      tcp . 2095,
      tcp . 2701,
      tcp . 2710,
      tcp . 3218,
      tcp . 5944,
      tcp . 6868,
      tcp . 6881,
      tcp . 6961,
      tcp . 6969,
      tcp . 6970,
      tcp . 7070,
      tcp . 7456,
      tcp . 7777,
      tcp . 8000,
      tcp . 8080,
      tcp . 8089,
      tcp . 9000,
      \
      udp . 80,
      udp . 451,
      udp . 1337,
      udp . 2710,
      udp . 2730,
      udp . 2770,
      udp . 2780,
      udp . 2800,
      udp . 2810,
      udp . 2920,
      udp . 5944,
      udp . 6868,
      udp . 6969,
      udp . 7070,
      udp . 8000,
      udp . 8080,
      udp . 8089,
      udp . 9337,
    }
  }

  # proxied 3-tuples, populated out-of-band by merging with timeout
  set transmission_ip4 {
    type inet_proto . inet_service . ipv4_addr
    flags timeout
  }
  set transmission_ip6 {
    type inet_proto . inet_service . ipv6_addr
    flags timeout
  }

  chain apply_tun_outpost {
    # mark a flow (and the matched packet) for proxying
    ct mark   set ct mark   or $want_tun_outpost
    meta mark set meta mark or $want_tun_outpost
  }

  chain transmission_tun_outpost {
    # never tunnel traffic to private/reserved destinations
    ip daddr @tun_bypass4 counter return
    ip6 daddr @tun_bypass6 counter return

    # never tunnel traffic to specific bypass destinations
    ip daddr @transmission_bypass4 counter return
    ip6 daddr @transmission_bypass6 counter return
    meta l4proto { tcp, udp } th dport { 6881-6889 } counter return

    # (1) restore a previously-made decision from conntrack onto this packet.
    # Only the *first* packet of a UDP tracker flow carries the BEP-15 magic;
    # the announce/scrape packets that follow have no signature, so without this
    # they would route via the default table and leak outside the tunnel.
    # ct mark persists for the life of the flow; meta mark is per-packet.
    ct mark and $want_tun_outpost == $want_tun_outpost \
      counter goto apply_tun_outpost

    # (2) UDP tracker, BEP-15 connect handshake:
    #   payload[0:8]  protocol_id == 0x41727101980   (@th,64,64)
    #   payload[8:12] action      == 0 (connect)     (@th,128,32)
    # UDP header is a fixed 8 bytes, so these offsets are exact. DHT (bencode
    # 'd'...) and µTP (type/version nibbles) cannot collide with 8 magic bytes.
    meta l4proto udp @ih,0,64 0x41727101980 @ih,64,32 0x0 \
      counter goto apply_tun_outpost

    # (3) Trackers by exact destination tuple (proto . port . addr), from the generator.
    # Primary path for HTTP/HTTPS (and UDP).
    meta l4proto . th dport . ip  daddr @transmission_ip4 \
      counter goto apply_tun_outpost
    meta l4proto . th dport . ip6 daddr @transmission_ip6 \
      counter goto apply_tun_outpost

    # (3) Fallback: match well-known and "leet" ports to catch traffic to common trackers
    # racing against the ipset generator.
    # NOTE: this also matches webseed traffic (which we do not care about).
    meta l4proto . th dport @transmission_ports \
      counter goto apply_tun_outpost

    # (4) NO cleartext-HTTP L7 signature rule here -- and not for lack of a good
    # matcher. `@ih,0,N` *does* robustly locate the L7 payload start (it accounts
    # for the variable TCP option length, unlike any fixed @th offset -- this was
    # verified: @ih,0,32 matches "GET " while @th,160 misses on a timestamped
    # connection). The problem is TCP routing, not matching:
    #   - A TCP connection's egress interface and source address are committed
    #     when the SYN is sent. The SYN (and the rest of the handshake) carry no
    #     L7 payload, so an announce signature is invisible until the first data
    #     segment -- by which point the connection is already established over the
    #     direct path.
    #   - Marking that first data segment reroutes it into the tunnel, handing
    #     sslocal's smoltcp a mid-stream segment for a flow it never saw the SYN
    #     for (and from a different source IP) -> the connection is reset.
    #   - Verified: an `@ih,0,64 0x474554202f616e6e` ("GET /ann") rule fires
    #     (counter=1) but curl dies with "Connection reset by peer".
    # => For TCP the decision MUST be made on the SYN, from SYN-time info only
    # (the 5-tuple).
  }

  chain oroute {
    type route hook output priority mangle; policy accept;

    socket cgroupv2 level 2 @torrents_slice \
      counter jump transmission_tun_outpost;
    # socket cgroupv2 level 3 @transmission_service \
    #   counter jump transmission_tun_outpost;
  }

  # chain omangle {
  #   type filter hook output priority mangle; policy accept;
  # }
}
